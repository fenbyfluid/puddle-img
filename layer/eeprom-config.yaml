# METABEGIN
# X-Env-Layer-Name: eeprom-config
# X-Env-Layer-Requires: rpi-boot-firmware
# METAEND
---
mmdebstrap:
  customize-hooks:
    - |-
      cat <<-EOF >> $1/boot/firmware/config.txt
      
      [all]
      dtparam=rtc_bbat_vchg=3000000
      EOF
      
      cat <<-EOF > $1/etc/puddle-eeprom-boot.conf
      [all]
      BOOT_UART=1
      BOOT_ORDER=0xf41
      NET_INSTALL_AT_POWER_ON=0
      POWER_OFF_ON_HALT=0
      PSU_MAX_CURRENT=5000
      EOF
      
      cat <<-EOF > $1/usr/libexec/puddle-eeprom-update
      #!/bin/bash
      
      if diff -uw <(rpi-eeprom-config) /etc/puddle-eeprom-boot.conf; then
        exit 0
      fi
      
      echo "Updating EEPROM configuration"
      rpi-eeprom-config --apply /etc/puddle-eeprom-boot.conf
      
      # Flash the LED to indicate completion
      echo timer > /sys/class/leds/ACT/trigger
      
      sleep 5
      reboot
      EOF
      
      chmod +x $1/usr/libexec/puddle-eeprom-update
      
      cat <<-EOF > $1/etc/systemd/system/puddle-eeprom-update.service
      [Unit]
      Description=Check and update EEPROM config
      After=boot-firmware.mount
      Before=rpi-eeprom-update.service
      
      [Service]
      Type=oneshot
      RemainAfterExit=true
      ExecStart=/usr/libexec/puddle-eeprom-update
      
      [Install]
      WantedBy=multi-user.target
      EOF
    - $BDEBSTRAP_HOOKS/enable-units "$1" puddle-eeprom-update
