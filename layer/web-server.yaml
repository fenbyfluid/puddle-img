# METABEGIN
# X-Env-Layer-Name: web-server
# X-Env-Layer-Requires: questdb,vnc-weston
# METAEND
---
mmdebstrap:
  packages:
    - nginx

  setup-hooks:
    - ( cd puddle-web && npm install && npm run build )

  customize-hooks:
    - cp -r puddle-web/build/client $1/usr/share/puddle-web
    - rm -f $1/etc/nginx/sites-enabled/default
    - |-
      cat <<-'EOF' > $1/etc/nginx/sites-available/puddle
      upstream questdb {
        server 127.0.0.1:9000;
      }
      
      upstream websockify {
        server 127.0.0.1:6080;
      }
      
      map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
      }
      
      server {
        server_name _;
        listen 80 default_server;
        listen [::]:80 default_server;
      
        root /usr/share/puddle-web;
        index index.html;
      
        location /questdb/ {
          alias /var/lib/questdb/public/;
        }
      
        location ~ /questdb/(imp|chk|exp|settings|exec|warnings) {
          proxy_pass http://questdb;
        }
      
        # QuestDB's base path setting misses the VSCode WebWorker
        location = /assets/vs/base/worker/workerMain.js {
          root /var/lib/questdb/public;
        }
      
        location = /websockify {
          proxy_pass http://websockify;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_cache_bypass $http_upgrade;
        }
      
        location / {
          try_files $uri $uri/ /index.html;
        }
      }
      EOF
    - ln -s ../sites-available/puddle $1/etc/nginx/sites-enabled/puddle
