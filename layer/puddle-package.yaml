# METABEGIN
# X-Env-Layer-Name: puddle-package
# X-Env-Layer-Category: general
# X-Env-Layer-Desc: Build and install puddle package.
# X-Env-Layer-Requires: questdb
#
# X-Env-VarPrefix: puddle
#
# X-Env-Var-drive: 192.168.10.2
# X-Env-Var-drive-Desc: Drive address
# X-Env-Var-drive-Valid: string
#
# METAEND
---
mmdebstrap:
  packages:
    - socat
  setup-hooks:
    - |-
      cargo install cargo-deb --locked
      ( cd puddle && cargo deb )
  customize-hooks:
    - |-
      mkdir -p $1/tmp/puddle-debs && cp -a puddle/target/debian/*.deb $1/tmp/puddle-debs
      chroot $1 sh -c "apt install -y /tmp/puddle-debs/*.deb"
    - sed -i "s/PUDDLE_DRIVE_ADDRESS=127.0.0.1/PUDDLE_DRIVE_ADDRESS=${IGconf_puddle_drive}/" $1/etc/systemd/system/puddle.service.d/override.conf
    - |-
      cat <<-EOF > $1/etc/systemd/system/puddle.service.d/questdb.conf
      [Unit]
      After=questdb.service
      Requires=questdb.service
      
      [Service]
      Environment=QDB_CLIENT_CONF="tcp::addr=127.0.0.1:9009;"
      EOF
    - $BDEBSTRAP_HOOKS/enable-units "$1" puddle
    - $BDEBSTRAP_HOOKS/enable-units "$1" puddle-rpi-stats
    - |-
      cat <<-EOF > $1/etc/systemd/system/linmot-rstalk-proxy.service
      [Unit]
      Description=linmot-rstalk-proxy
      After=network-online.target
      StartLimitIntervalSec=0
      
      [Service]
      Type=simple
      ExecStart=/usr/bin/socat -d -d udp4-listen:20000 udp4:${IGconf_puddle_drive}:20000
      Restart=always
      RestartSec=10s
      
      [Install]
      WantedBy=multi-user.target
      EOF
    - $BDEBSTRAP_HOOKS/enable-units "$1" linmot-rstalk-proxy
  cleanup-hooks:
    - rm -rf $1/tmp/puddle-debs
